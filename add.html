<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | SMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="header_icon.jpg" type="image/x-icon">
</head>
<body>
<header>
    <img src="header_icon.jpg" alt="Logo" id="header_logo">
    <h1>Student Management System</h1>
    <button id="theme">🌙</button>
</header>
<nav>
    <ul>
        <li><a href="index.html">📋 Students</a></li>
        <li><a href="marks.html">📝 Marks</a></li>
        <li><a href="fees.html">💰 Fees</a></li>
        <li><a href="attendance.html">📅 Attendance</a></li>
        <li><a href="add.html" class="active">➕ Add Student</a></li>
    </ul>
</nav>

<div class="add-page-wrapper">
    <div class="add-card">
        <div class="card-header">
            <div class="card-icon">🎓</div>
            <div>
                <h2>Add New Student</h2>
                <p>Fill in all details to register a student</p>
            </div>
        </div>
        <form id="add-student-form">
            <div class="form-grid">
                <div class="form-group"><label>Register Number</label><input type="text" id="registerNumber" placeholder="e.g. 22CS001" required></div>
                <div class="form-group"><label>Student Name</label><input type="text" id="studentName" placeholder="Full name" required></div>
                <div class="form-group"><label>Department</label><input type="text" id="department" placeholder="e.g. Computer Science" required></div>
                <div class="form-group"><label>Year</label>
                    <select id="years" required>
                        <option value="">Select Year</option>
                        <option value="First">First Year</option>
                        <option value="Second">Second Year</option>
                        <option value="Third">Third Year</option>
                        <option value="Fourth">Fourth Year</option>
                    </select>
                </div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="dateOfBirth" required></div>
                <div class="form-group"><label>Blood Group</label>
                    <select id="bloodGroup" required>
                        <option value="">Select</option>
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
                    </select>
                </div>
                <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="student@email.com" required></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="mobileNo" placeholder="10-digit number" pattern="[0-9]{10}" maxlength="10" required></div>
                <div class="form-group form-full"><label>Address</label><input type="text" id="address" placeholder="Full address" required></div>
                <div class="form-group"><label>Guardian Name</label><input type="text" id="guardianName" placeholder="Parent / Guardian" required></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">➕ Add Student</button>
                <button type="reset" class="btn-outline">Clear</button>
            </div>
        </form>
    </div>
</div>

<footer><p>&copy; 2026 Student Management System — All rights reserved.</p></footer>
<script src="script.js"></script>
</body>
</html>
